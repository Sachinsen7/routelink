version: '3.9'

services:
    postgres:
        image: postgres:16-alpine
        environment:
            POSTGRES_USER: routelink
            POSTGRES_PASSWORD: password
        ports:
            - '5432:5432'
        volumes:
            - postgres_data:/var/lib/postgresql/data
            - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro

    redis:
        image: redis:7-alpine
        ports:
            - '6379:6379'

    auth-service:
        build: ./services/auth-service
        environment:
            PORT: 4001
            DATABASE_URL: postgresql://neondb_owner:npg_BYdLJ65ZmxVs@ep-green-bush-aht177vg-pooler.c-3.us-east-1.aws.neon.tech/neondb?sslmode=require&channel_binding=require&schema=auth
            REDIS_URL: redis://redis:6379
        ports:
            - '4001:4001'
        depends_on:
            - postgres
            - redis

    user-service:
        build: ./services/user-service
        environment:
            PORT: 4002
            DATABASE_URL: postgresql://neondb_owner:npg_BYdLJ65ZmxVs@ep-green-bush-aht177vg-pooler.c-3.us-east-1.aws.neon.tech/neondb?sslmode=require&channel_binding=require&schema=user
            REDIS_URL: redis://redis:6379
        ports:
            - '4002:4002'
        depends_on:
            - postgres
            - redis

    route-service:
        build: ./services/route-service
        environment:
            PORT: 4003
            DATABASE_URL: postgresql://neondb_owner:npg_BYdLJ65ZmxVs@ep-green-bush-aht177vg-pooler.c-3.us-east-1.aws.neon.tech/neondb?sslmode=require&channel_binding=require&schema=route
            REDIS_URL: redis://redis:6379
        ports:
            - '4003:4003'
        depends_on:
            - postgres
            - redis

    chat-service:
        build: ./services/chat-service
        environment:
            PORT: 4004
            DATABASE_URL: postgresql://neondb_owner:npg_BYdLJ65ZmxVs@ep-green-bush-aht177vg-pooler.c-3.us-east-1.aws.neon.tech/neondb?sslmode=require&channel_binding=require&schema=chat
            REDIS_URL: redis://redis:6379
        ports:
            - '4004:4004'
        depends_on:
            - postgres
            - redis

    payment-service:
        build: ./services/payment-service
        environment:
            PORT: 4005
            DATABASE_URL: postgresql://neondb_owner:npg_BYdLJ65ZmxVs@ep-green-bush-aht177vg-pooler.c-3.us-east-1.aws.neon.tech/neondb?sslmode=require&channel_binding=require&schema=payment
            REDIS_URL: redis://redis:6379
        ports:
            - '4005:4005'
        depends_on:
            - postgres
            - redis

    notification-service:
        build: ./services/notification-service
        environment:
            PORT: 4006
            DATABASE_URL: postgresql://neondb_owner:npg_BYdLJ65ZmxVs@ep-green-bush-aht177vg-pooler.c-3.us-east-1.aws.neon.tech/neondb?sslmode=require&channel_binding=require&schema=notification
            REDIS_URL: redis://redis:6379
        ports:
            - '4006:4006'
        depends_on:
            - postgres
            - redis

volumes:
    postgres_data:
